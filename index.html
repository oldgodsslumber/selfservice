    </div>`;
}

function joinConference(room, token) {
  const JMJ = window.JitsiMeetJS;
  if (!JMJ) { showCallError('SDK not loaded', ''); return; }

  JMJ.init({
    disableAudioLevels: true,
    disableSimulcast:   true,    /* single high-quality stream instead of 3 degraded layers */
    useIPv6:            false,
    videoQuality: {
      maxBitratesVideo: {
        low:      500000,
        standard: 2500000,
        high:     6000000,
      },
      minHeightForQualityLvl: { 360: 'standard', 720: 'high', 1080: 'high' },
    },
  });
  JMJ.setLogLevel(JMJ.logLevels.ERROR);

  const options = {
    hosts: {
      domain: '8x8.vc',
      muc:    `conference.${JAAS.appId}.8x8.vc`,
    },
    serviceUrl: `wss://8x8.vc/${JAAS.appId}/xmpp-websocket?room=${room}`,
    clientNode: 'http://jitsi.org/jitsimeet',
  };

  function setConnStatus(msg) {
    const el = document.getElementById('main-placeholder');
    if (el) el.textContent = msg;
  }

  const conn = new JMJ.JitsiConnection(null, token, options);
  S.call.conn = conn;
  setConnStatus('Connecting to server…');

  conn.addEventListener(JMJ.events.connection.CONNECTION_ESTABLISHED, async () => {
    setConnStatus('Connected — joining conference…');
    const conf = conn.initJitsiConference(room, {
      p2p: {
        enabled:     true,
        preferH264:  true,
        useStunTurn: true,
      },
      startWithAudioMuted: false,
      startWithVideoMuted: false,
    });
    S.call.conf = conf;

    conf.on(JMJ.events.conference.TRACK_ADDED,        onCallTrackAdded);
    conf.on(JMJ.events.conference.TRACK_REMOVED,      onCallTrackRemoved);
    conf.on(JMJ.events.conference.CONFERENCE_JOINED,  onCallJoined);
    conf.on(JMJ.events.conference.USER_JOINED,        onCallUserJoined);
    conf.on(JMJ.events.conference.USER_LEFT,          onCallUserLeft);
    conf.on(JMJ.events.conference.CONFERENCE_FAILED,  (err, ...args) => {
      console.error('CONFERENCE_FAILED:', err, args);
      showCallError('Conference failed', String(err) + (args.length ? ' — ' + args.join(', ') : ''));
    });
    conf.on(JMJ.events.conference.CONFERENCE_ERROR,   (err, ...args) => {
      console.error('CONFERENCE_ERROR:', err, args);
      showCallError('Conference error', String(err));
    });
    conf.on(JMJ.events.conference.AUTH_STATUS_CHANGED, (auth, id) => {
      console.warn('AUTH_STATUS_CHANGED:', auth, id);
    });

    setConnStatus('Joining room…');
    conf.join(token);

    /* Safety timeout — if CONFERENCE_JOINED hasn't fired after 15s, surface an error */
    setTimeout(() => {
      if (!S.call.localTracks.length && S.call.conf === conf) {
        setConnStatus('Still trying to join… If this persists, check the browser console (F12) for errors.');
      }
    }, 15000);
  });

  conn.addEventListener(JMJ.events.connection.CONNECTION_FAILED, err => {
    showCallError('Connection failed', String(err));
  });

  conn.connect();
}

async function onCallJoined() {
  /* Create local tracks using devices selected during setup */
  let tracks = [];
  try {
    tracks = await JitsiMeetJS.createLocalTracks({
      devices: ['audio', 'video'],
      constraints: {
        video: {
          width:     { ideal: 1920, max: 1920 },
          height:    { ideal: 1080, max: 1080 },
          frameRate: { ideal: 30,   max: 30   },
        },
      },
      ...(S.dev.curVideoId ? { cameraDeviceId: S.dev.curVideoId } : {}),
      ...(S.dev.curAudioId ? { micDeviceId:    S.dev.curAudioId } : {}),
    });
  } catch(e) {
    console.warn('Could not create local tracks:', e);
  }

  S.call.localTracks = tracks;
  for (const t of tracks) {
    try { S.call.conf.addTrack(t); } catch(e) {}
  }

  /* Tell the SFU/P2P layer we want to send up to 1080p; it will back off to 720p if bandwidth is tight */
  try { S.call.conf.setSenderVideoConstraint(1080); } catch(e) {}

  renderCallGrid();
  updateCallControls();

  /* Re-apply the virtual background chosen during setup */
  if (S.bgType !== 'none') {
    applyCallBgEffect(S.bgType).catch(e => console.warn('Auto bg effect failed:', e));
  }
}

function toggleMic() {
  const track = S.call.localTracks.find(t => t.getType() === 'audio');
  if (!track) return;
  (track.isMuted() ? track.unmute() : track.mute()).then(updateCallControls).catch(() => {});
}

function toggleCam() {
  const track = S.call.localTracks.find(t => t.getType() === 'video');
  if (!track) return;
  (track.isMuted() ? track.unmute() : track.mute()).then(updateCallControls).catch(() => {});
}

function updateCallControls() {
  const audio = S.call.localTracks.find(t => t.getType() === 'audio');
  const video = S.call.localTracks.find(t => t.getType() === 'video' && t.getVideoType?.() !== 'desktop');

  const micBtn   = document.getElementById('mic-btn');
  const camBtn   = document.getElementById('cam-btn');
  const shareBtn = document.getElementById('share-btn');
  const recBtn   = document.getElementById('rec-btn');

  if (micBtn) {
    const muted = audio?.isMuted() ?? false;
    micBtn.classList.toggle('active', muted);
    micBtn.innerHTML = `<span class="tb-icon">${muted ? '🔇' : '🎤'}</span>${muted ? 'Unmute' : 'Mute'}`;
  }
  if (camBtn) {
    const muted = video?.isMuted() ?? false;
    camBtn.classList.toggle('active', muted);
    camBtn.innerHTML = `<span class="tb-icon">${muted ? '🚫' : '📷'}</span>${muted ? 'Cam Off' : 'Camera'}`;
  }
  if (shareBtn) {
    const sharing = S.call.localTracks.some(t => t.getVideoType?.() === 'desktop');
    shareBtn.classList.toggle('active', sharing);
    shareBtn.innerHTML = `<span class="tb-icon">💻</span>${sharing ? 'Stop Share' : 'Share Screen'}`;
  }
  if (recBtn) {
    recBtn.classList.toggle('rec-on', S.call.recActive);
    recBtn.innerHTML = `<span class="tb-icon">⏺</span>${S.call.recActive ? 'Stop Rec' : 'Record'}`;
  }
}

function toggleBgPanel() {
  const panel = document.getElementById('bg-panel');
  if (!panel) return;
  panel.classList.toggle('open');
  const btn = document.getElementById('bg-btn');
  if (btn) btn.classList.toggle('active', panel.classList.contains('open'));
}

async function toggleShare() {
  const existing = S.call.localTracks.find(t => t.getVideoType?.() === 'desktop');
  if (existing) {
    /* Stop sharing */
    try { await S.call.conf.removeTrack(existing); } catch(e) {}
    existing.dispose();
    S.call.localTracks = S.call.localTracks.filter(t => t !== existing);
    updateCallControls();
    return;
  }
  /* Start sharing */
  try {
    const tracks = await JitsiMeetJS.createLocalTracks({ devices: ['desktop'] });
    for (const t of tracks) {
      S.call.localTracks.push(t);
      try { await S.call.conf.addTrack(t); } catch(e) {}
      /* Auto-stop when user clicks browser's "Stop sharing" button */
      t.addEventListener(JitsiMeetJS.events.track.LOCAL_TRACK_STOPPED, () => {
        S.call.localTracks = S.call.localTracks.filter(x => x !== t);
        updateCallControls();
      });
    }
    updateCallControls();
  } catch(e) {
    if (!String(e).includes('cancel')) console.warn('Screen share error:', e);
  }
}

function onCallTrackAdded(track) {
  if (track.isLocal()) return;
  const pid = track.getParticipantId();
  if (!S.call.remoteTracks[pid]) S.call.remoteTracks[pid] = {};

  if (track.getType() === 'video') {
    const isDesktop = (track.getVideoType?.() === 'desktop');
    if (isDesktop) S.call.remoteTracks[pid].desktop = track;
    else           S.call.remoteTracks[pid].camera  = track;
    /* Re-request maximum quality now that we have the actual track */
    requestMaxQuality(pid);
    renderCallGrid();
  } else {
    S.call.remoteTracks[pid].audio = track;
    let aud = document.getElementById(`aud-${pid}`);
    if (!aud) {
      aud = document.createElement('audio');
      aud.id = `aud-${pid}`; aud.autoplay = true;
      document.body.appendChild(aud);
    }
    track.attach(aud);
  }
}

function onCallTrackRemoved(track) {
  if (track.isLocal()) return;
  const pid = track.getParticipantId();
  if (S.call.remoteTracks[pid]) {
    if (track.getType() === 'video') {
      const isDesktop = (track.getVideoType?.() === 'desktop');
      if (isDesktop) delete S.call.remoteTracks[pid].desktop;
      else           delete S.call.remoteTracks[pid].camera;
      renderCallGrid(); /* main view falls back to camera when share ends */
    } else {
      delete S.call.remoteTracks[pid].audio;
    }
  }
  track.detach();
  const aud = document.getElementById(`aud-${pid}`);
  if (aud) aud.remove();
}

function requestMaxQuality(id) {
  if (!S.call.conf) return;
  /* Tell the SFU/P2P layer to treat this person as "on stage" —
     send us their highest quality layer (up to 1080p). */
  try {
    S.call.conf.setReceiverVideoConstraints({
      lastN:              -1,
      onStageEndpoints:   [id],
      selectedEndpoints:  [id],
      defaultConstraints: { maxHeight: 1080 },
      constraints:        { [id]: { maxHeight: 1080, minHeight: 720 } },
    });
  } catch(e) {}
  /* Also set the preferred max frame height for the conference as a whole */
  try { S.call.conf.setReceiverConstraints?.({ lastN: -1, defaultConstraints: { maxHeight: 1080 } }); } catch(e) {}
}

function onCallUserJoined(id, participant) {
  S.call.names[id] = participant.getDisplayName() || 'Guest';
  requestMaxQuality(id);
  renderCallGrid();
}

function onCallUserLeft(id) {
  delete S.call.names[id];
  delete S.call.remoteTracks[id];
  const aud = document.getElementById(`aud-${id}`);
  if (aud) aud.remove();
  renderCallGrid();
}

async function leaveConference() {
  stopCallRec();
  if (S.call.bgEffect) { S.call.bgEffect.stopEffect(); S.call.bgEffect = null; }
  S.call.origVideoTrack = null;
  for (const t of S.call.localTracks) { try { t.dispose(); } catch(e) {} }
  S.call.localTracks = [];
  if (S.call.conf) { try { await S.call.conf.leave(); } catch(e) {} S.call.conf = null; }
  if (S.call.conn) { try { S.call.conn.disconnect(); } catch(e) {} S.call.conn = null; }
  S.call.remoteTracks = {};
  S.call.names        = {};
  document.querySelectorAll('audio[id^="aud-"]').forEach(a => a.remove());
}

/* =============================================================
   CALL RECORDING (per-participant)
   ============================================================= */
function toggleCallRec() { S.call.recActive ? stopCallRec() : startCallRec(); }

function startCallRec() {
  S.call.recActive     = true;
  S.call.recSecs       = 0;
  S.call.takeNum++;
  /* Stop any leftover recorders from a previous take but keep blobs/downloads intact */
  for (const { recorder } of Object.values(S.call.recorders)) {
    try { if (recorder.state !== 'inactive') recorder.stop(); } catch(e) {}
  }
  S.call.recorders     = {};
  S.call.endWarnShown  = false;

  updateCallControls();
  const status = document.getElementById('rec-status');
  const takeLabel = S.call.takeNum > 1 ? ' (Take ' + S.call.takeNum + ')' : '';
  if (status) status.innerHTML =
    `<span style="display:flex;align-items:center;gap:5px">
       <span style="width:7px;height:7px;background:var(--danger);border-radius:50%;animation:blink 1s infinite;flex-shrink:0"></span>
       <span id="rec-timer">00:00</span><span style="font-size:11px;opacity:.7">${takeLabel}</span>
     </span>`;

  S.call.recTimer = setInterval(() => {
    S.call.recSecs++;
    const t = document.getElementById('rec-timer');
    if (t) t.textContent = fmtTime(S.call.recSecs);
  }, 1000);

  const tn = S.call.takeNum;

  /* Local participant */
  const lv = S.call.localTracks.find(t => t.getType() === 'video');
  const la = S.call.localTracks.find(t => t.getType() === 'audio');
  if (lv || la) {
    const tracks = [];
    if (lv) tracks.push(...lv.getOriginalStream().getVideoTracks());
    if (la) tracks.push(...la.getOriginalStream().getAudioTracks());
    if (tracks.length) startParticipantRec('local-t' + tn, new MediaStream(tracks));
  }

  /* Remote participants — camera feed */
  for (const [pid, rt] of Object.entries(S.call.remoteTracks)) {
    const tracks = [];
    if (rt.camera)  tracks.push(...rt.camera.getOriginalStream().getVideoTracks());
    if (rt.audio)   tracks.push(...rt.audio.getOriginalStream().getAudioTracks());
    if (tracks.length) startParticipantRec(pid + '-t' + tn, new MediaStream(tracks));
  }
  /* Remote participants — screen share (recorded separately if active) */
  for (const [pid, rt] of Object.entries(S.call.remoteTracks)) {
    if (rt.desktop) {
      const dTracks = rt.desktop.getOriginalStream().getVideoTracks();
      if (dTracks.length) startParticipantRec(pid + '-screen-t' + tn, new MediaStream(dTracks));
    }
  }
}

function startParticipantRec(id, stream) {
  const mime = [
    'video/mp4;codecs=avc1,mp4a.40.2',
    'video/mp4',
    'video/webm;codecs=vp9,opus',
    'video/webm;codecs=vp8,opus',
    'video/webm',
  ].find(m => { try { return MediaRecorder.isTypeSupported(m); } catch(e) { return false; } }) || '';

  const recorder = new MediaRecorder(stream, {
    ...(mime ? { mimeType: mime } : {}),
    videoBitsPerSecond: 12_000_000,
    audioBitsPerSecond:    256_000,
  });
  const chunks = [];
  recorder.ondataavailable = e => { if (e.data?.size > 0) chunks.push(e.data); };
  recorder.onstop = () => onCallRecStop(id, chunks, mime);
  recorder.start(100);
  S.call.recorders[id] = { recorder, chunks, mime };
}

function stopCallRec() {
  if (!S.call.recActive) return;
  clearInterval(S.call.recTimer);
  S.call.recActive = false;
  S.call.recTimer  = null;
  for (const { recorder } of Object.values(S.call.recorders)) {
    try { if (recorder.state !== 'inactive') recorder.stop(); } catch(e) {}
  }
  updateCallControls();
  const status = document.getElementById('rec-status');
  if (status) status.innerHTML = '';
}

function onCallRecStop(id, chunks, mime) {
  if (!chunks.length) return;
  const actualMime = chunks[0]?.type || mime || 'video/webm';
  const blob  = new Blob(chunks, { type: actualMime });
  const url   = URL.createObjectURL(blob);
  const mb    = (blob.size / 1048576).toFixed(1);
  const ext   = actualMime.includes('mp4') ? 'mp4' : 'webm';
  const ts    = new Date().toISOString().slice(0, 19).replace(/:/g, '-');

  /* Parse the take-aware ID: 'local-t2', 'pid-t1', 'pid-screen-t3' */
  const takeMatch = id.match(/-t(\d+)$/);
  const take      = takeMatch ? +takeMatch[1] : 1;
  const baseId    = takeMatch ? id.replace(/-t\d+$/, '') : id;
  const rawLabel  = baseId === 'local' ? 'host' : (S.call.names[baseId] || baseId).replace(/\s+/g, '-').toLowerCase();
  const takeTag   = take > 1 ? '-take' + take : '';
  const dispTake  = take > 1 ? ' <span style="color:var(--accent);font-weight:600">(Take ' + take + ')</span>' : '';
  const fname     = 'call-' + rawLabel + takeTag + '-' + ts + '.' + ext;

  S.call.recBlobs[id] = { url, ext, name: fname, take };
  S.call.downloaded[id] = false;
  S.call.endWarnShown   = false;

  const row = document.getElementById('rec-download-row');
  if (!row) return;
  row.style.display = '';

  /* Always create a new item — each take gets its own row */
  const item = document.createElement('div');
  item.className = 'dl-item';
  item.dataset.recId = id;
  row.appendChild(item);

  const safeId = id.replace(/[^a-zA-Z0-9_-]/g, '_');
  item.innerHTML =
    '<span class="dl-badge pending" id="dl-badge-' + safeId + '">⬇ Not downloaded</span>' +
    '<span style="font-size:12px;flex:1"><strong>' + rawLabel + '</strong>' + dispTake + ' · ' + mb + ' MB · ' + ext.toUpperCase() + '</span>' +
    '<a href="' + url + '" download="' + fname + '" class="btn btn-success" ' +
       'style="font-size:12px;padding:5px 10px" onclick="markDownloaded(\'' + id + '\')">' +
      '⬇ Download' +
    '</a>';

  updateEndCallBtn();
}

function markDownloaded(id) {
  S.call.downloaded[id] = true;
  const safeId = id.replace(/[^a-zA-Z0-9_-]/g, '_');
  const badge = document.getElementById('dl-badge-' + safeId);
  if (badge) { badge.className = 'dl-badge done'; badge.textContent = '✓ Downloaded'; }
  /* If all files are now downloaded, reset the warning state */
  const allDone = Object.keys(S.call.recBlobs).every(k => S.call.downloaded[k]);
  if (allDone) {
    S.call.endWarnShown = false;
    updateEndCallBtn();
    const row = document.getElementById('rec-download-row');
    if (row) row.classList.remove('warn-pending');
  }
}

function updateEndCallBtn() {
  const btn = document.querySelector('.tb-btn.end');
  if (!btn) return;
  const hasPending = Object.keys(S.call.recBlobs).some(k => !S.call.downloaded[k]);
  if (hasPending && S.call.endWarnShown) {
    btn.innerHTML = '<span class="tb-icon">⚠️</span>End Anyway';
  } else {
    btn.innerHTML = '<span class="tb-icon">📵</span>End Call';
  }
}

/* =============================================================
   FINISH
   ============================================================= */
function finish() {
  document.body.classList.remove('jitsi-mode');
  leaveConference();
  if (S.stream)   { S.stream.getTracks().forEach(t => t.stop()); S.stream = null; }
  if (S.audioCtx) { S.audioCtx.close(); S.audioCtx = null; }
  if (S.rafId)    { cancelAnimationFrame(S.rafId); S.rafId = null; }

  const isJitsi = S.mode === 'jitsi';
  document.getElementById('content').innerHTML = `
    <div class="completion">
      <div class="big-icon">${isJitsi ? '👋' : '🎬'}</div>
      <h2>Great work!</h2>
      <p>${isJitsi
        ? 'Your call has ended. Thanks for using the studio!'
        : 'Your recording is complete. Download your file if you haven\'t already — then you\'re done.'}</p>
      <button class="btn btn-ghost" onclick="location.reload()" style="margin-top:24px">Start Over</button>
    </div>`;

  document.querySelector('footer').style.display = 'none';
  renderBar();
}

/* =============================================================
   BOOT
   ============================================================= */
render();
</script>
</body>
</html>
